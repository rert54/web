<!DOCTYPE html>
<html>
  <head>
    <title>hello</title>
    <script>

      // 𣝣俯ｳｵ橖ｸ
  
      // 1. for橖ｸ
      for(var i=0;i<5; i++){
        console.log("Hello: ", i);
      }

      //2. while橖ｸ
      var i=0;
      while(i<5){
        console.log("world: ", i);
        i++;
      }

      //3. do‾while橖ｸ
      var i=0;
      do{
        console.log("happy: ", i);
        i++;
      }while(i<5);

      
    </script>
  </head>

  </body>
</html>
