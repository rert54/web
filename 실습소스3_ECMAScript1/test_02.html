<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        <script>
        function ok(){
            console.log("ok");

        }


    
        

        //이벤트 연결
       function init(){
        var btn = document.querySelector("#x");
         console.log(btn);
         btn.onclick = ok; 
       } // 기능 구현때 콜백으로 해야한다. 함수가 아닌 함수명만 기재 여기선 ok
         
         </script>
         -

</head>

 <!-- 화면이 만들어지고나서 호출 하기 위해서 온로드를 사용
  이러면 버튼을 만들고 쿼리가 들어잇는 init 함수를 시작한다
  body 뒤에 onload를 붙이고 init 함수를 명시해 줌 -->
  <!--onload="init()" 대신에
  스크립트에 window.onload = init; 넣고 가능하다-->

  <body onload="init()">
    
    <button id ="x">ok</button>

</body>


</html>
