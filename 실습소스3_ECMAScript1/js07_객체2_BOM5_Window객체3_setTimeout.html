<!DOCTYPE html>
<html>
  <head>
    <title>hello</title>
    <script>

     // setTimeout(function(){}, delay);  (함수, 시간 1/1000단위)
     // 단 한번만 실행됨

      // setInterval(function(){}, delay);
     // 반복 실행됨
  
     function run(){
       
         setTimeout(function(){
           console.log("2초뒤에 출력됨");
         }, 2000);
     }
  

    </script>
  </head>
  <body>
    <button onclick="run()">start</button>
  </body>
</html>
