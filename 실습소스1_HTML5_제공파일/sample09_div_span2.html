<!DOCTYPE html>
<html lang="en">
<head>
    <title>안녕하세요</title>
    <style>
        span{
          width: 100px;
          height:200px;
          background-color: red;
        }
        div{
          width: 100px;
          height:200px;
          background-color: yellow;
        }
    </style>
</head>
<body>
    <!--
      tag 그룹핑: div, width와 height가 적용됨.
      문자열 그룹핑: span , width와 height 지정해도 무시됨.
    -->
    <div>홍길동1</div>님.
    <span>홍길동2</span>님.
</body>
</html>
