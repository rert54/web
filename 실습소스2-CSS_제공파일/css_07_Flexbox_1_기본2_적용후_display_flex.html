<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>flex 실습</title>
<style type="text/css">

  /*
     Flexbox

    1)개요
        float 또는 positioning 없이 유연한 반응형 레이아웃 
        구조를 매우 쉽게 적용하기 위한 1차원 (행 또는 열)으로 지정 방법이다.
        기본적으로 행 방향으로 배치되기 때문에 행 방향이 주축이고 열 방향이 교차축이 된다.
        기존방식으로는 Vertical Centering, Dynamic Sizing, 
        Custom Ordering 같은 처리를 어렵게 구현했으나 
        Flexbox 모듈에서는 매우 쉽게 구현이 가능하다.
        display:inline-block로 된 요소는 Flexbox로 변경할 여지가 크다.
        

    2) 구성요소
        - 반드시 부모/자식 관계를 설정해야 된다. ( 자손은 적용 안됨 )
            중첩이 가능하다.
        - 부모는 Flex Container 이고
            자식은 Flex Item이 된다.
        - 부모인 Flex Container에서 CSS로 display:flex 로 지정.
            
  3) Flex Container 생성
  
   - display:flex 로 지정해야 된다.
     실행결과는 다음과 같다.
     가. 모든 div 요소가 한 행에 배치됨. 
        즉 전형적인 block 레벨 요소의 동작을 따르지 않음.
     나. 명시적으로 지정한 width와 heigt 값을 가짐.
     다. 명시적으로 height 값을 지정하지 않으면 
         가장 큰 height 값이 적용됨.
     라. 브라우저 화면 크기를 줄이면 요소의 너비가 줄어듬.
        계속 줄어들지는 않고 최소한의 공간까지만 줄어듬.

     개발자 도구에서 align-content 을 활성화/비활성화 하면서 변경사항을 확인할 것.   
  */

* {
    box-sizing: border-box;
    font-size: 1.5rem;
}

html {
    background: #b3b3b3;
    padding: 5px;
}

body {
    background: #b3b3b3;
    padding: 5px;
    margin: 0;
  }
  
.flex-container {
    background: white;
    padding: 10px;
    border: 5px solid black;

    /*  Flexbox 적용    */
    display: flex;
  }

.item-1 {
    background: #ff7300;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
}

.item-2 {
    background: #ff9640;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 250px;
    font-size: 1.8rem;
}

.item-3 {
    background: #ff9640;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    height: 250px;
}

.item-4 {
    background: #f5c096;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 300px;
    height: 300px;
}

.item-5 {
    background: #d3c0b1;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 350px;
}

.item-6 {
    background: #d3c0b1;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 350px;
}
</style>
</head>
<body>
    <div class="flex-container">
        <div class="item-1">div</div>
        <div class="item-2">w=250px</div>
        <div class="item-3">h=250px</div>
        <div class="item-4">w/h=300px</div>
        <div class="item-5">w=350px</div>
        <div class="item-6">w=350px</div>
    </div>
</body>
</html>
