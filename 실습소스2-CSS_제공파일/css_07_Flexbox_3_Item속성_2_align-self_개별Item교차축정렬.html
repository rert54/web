<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>flex 실습</title>
<style type="text/css">

  /*

    Flex Item 속성
   
   2) align-self 속성 ( 개별 Item의 교차축 정렬 )

   -Flex Container의 속성인 align-items(교차축 정렬) 을 
    Flex Item(특정항목)별로 재정의(교차축 정렬)하는 방법이다.
    즉 align-items는 Flex Container 프로퍼티이기 때문에 모든 item들에 영향을 주는데
    align-self는 개별 item (단일요소)만 재정의할 수 있다.

   -속성값은 align-items와 동일하다.
      stretch: 기본값
      flex-start : 박스 상단 기준에 맞춰 정렬
      flex-end   : 박스 하단 기준에 맞춰 정렬
      center     : 박스 중간에 맞춰 정렬
      baseline   : 박스 상단이 아니라 실제 컨텐츠의 기준선에 맞춰 정렬됨.

  */

* {
    box-sizing: border-box;
    font-size: 1.5rem;
}

html {
    background: #b3b3b3;
    padding: 5px;
}

body {
    background: #b3b3b3;
    padding: 5px;
    margin: 0;
  }
  
.flex-container {
    background: white;
    padding: 10px;
    border: 5px solid black;

    /*  Flexbox 적용    */
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    /* align-content: center; */
    height: 1500px;
  }

.item-1 {
    background: #ff7300;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
}

.item-2 {
    background: #ff9640;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 250px;
    font-size: 1.8rem;

    align-self: center;
}

.item-3 {
    background: #ff9640;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    height: 250px;
}

.item-4 {
    background: #f5c096;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 300px;
    height: 300px;

    align-self: flex-end;
}

.item-5 {
    background: #d3c0b1;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 350px;

    align-self: center;
}

.item-6 {
    background: #d3c0b1;
    color: white;
    padding: 10px;
    border: 5px solid black;
    margin: 10px;
    width: 350px;
}
</style>
</head>
<body>
    <div class="flex-container">
        <div class="item-1">div</div>
        <div class="item-2">w=250px</div>
        <div class="item-3">h=250px</div>
        <div class="item-4">w/h=300px</div>
        <div class="item-5">w=350px</div>
        <div class="item-6">w=350px</div>
    </div>
</body>
</html>
