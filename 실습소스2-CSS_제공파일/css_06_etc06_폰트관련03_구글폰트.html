<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>font-style 실습</title>
<!--
    웹폰트(web fonts)인  Google Fonts 사용하기
        -장점: 사용자의 사용중인 브라우저나 장치에 설치된 폰트에 관계없이 사용가능한 방법이다.
	     -단점: 각각의 html 파일에 구글폰트 링크(link)를 추가해야 된다. ( 권장 안함 )
               해결방법은 @import 방법을 사용한다. 모든 html이 참조하는 css에 설정한다. ( 권장 방식)

         -방법
         가. https://fonts.google.com/ 접속
         나. 왼쪽 메뉴에서 Serif, Sans Serif 선택 ( 실습에서는 Sans Serif 선택 )
         다. 오른쪽 큰 화면에서 두 번째 Noto Sans Korean 선택하고 오른쪽 상단의 Get font 버튼 클릭 > Get embed code 선택
            ( 오른쪽 상단에 remove font family 라고 나왔을 때 클릭하면 선택된 Noto Sans Korean 이 가장 상위에 위치된다. 
               이때 오른쪽 상단의 Get font 버튼 클릭한다. )
         라. Web > <link> 선택하고 복사해서 붙이기

            html의 <head>태그에 붙이기
               <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                     <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

                  <style> 태그에 붙이고 수정하기

            .noto-sans kr-<uniquifier> {
            font-family: "Noto Sans KR", sans-serif;
            font-optical-sizing: auto;
            font-weight: <weight>;
            font-style: normal;
            }





-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
<style>
      .noto-sans-regular {
         font-family: "Noto Sans KR", sans-serif;
         font-weight: 400;
         font-style: normal;
      }
      .noto-sans-bold {
         font-family: "Noto Sans KR", sans-serif;
         font-weight: 700;
         font-style: normal;
      }
</style>
</head>
<body>
   
   <p>Lorem ipsum</p>
   <p class="noto-sans-regular">Lorem ipsum</p>
   <p class="noto-sans-bold">홍길동</p>
</body>
</html>
