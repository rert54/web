<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pseudo 실습</title>
<style type="text/css">

/* i:first-child {} : i 태그의 부모기준으로 첫 번째 i태그 반환. */

 i:first-child {
	color:red;
}

</style>
</head>
<body>
	<p>I am a 
		<i>strong</i> man. I am a 
		<i>strong</i> man.
	 </p>
	 <p>I am a 
	   <i>strong</i> man. I am a 
	   <i>strong</i> man.
	 </p>
</body>
</html>
