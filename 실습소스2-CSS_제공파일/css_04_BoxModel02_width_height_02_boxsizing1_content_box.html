<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>기존 Box 모델 실습</title>
<style type="text/css">
  #one {
    width: 160px;
    height: 80px;
    border: 8px solid red;
    /* 
     Total width: 160px +  (2 * 8px) = 176px
     Total height: 80px +  (2 * 8px) = 96px
     Content box width: 160px
     Content box height: 80px 
     */
    background: yellow;
    box-sizing: content-box;
   }

  #two {
    width: 160px;
    height: 80px;
    padding: 20px;
    border: 8px solid red;
    /* 
     Total width: 160px + (2 * 20px) + (2 * 8px) = 216px
     Total height: 80px + (2 * 20px) + (2 * 8px) = 136px
     Content box width: 160px
     Content box height: 80px 
     */
    box-sizing: content-box;
  } 
  #three {
    width: 160px;
    height: 80px;
    padding: 20px;
    border: 8px solid red;
     /*  margin은 제외  */
    margin: 0px 200px 0px 0px;
    /* 
     Total width: 160px + (2 * 20px) + (2 * 8px) = 216px
     Total height: 80px + (2 * 20px) + (2 * 8px) = 136px
     Content box width: 160px
     Content box height: 80px 
     */
    box-sizing: content-box;
  } 
</style>
</head>
<body>
  <div id="one">hello</div>
  <div id="two">hello</div>
  <div id="three">hello</div>
</body>
</html>
