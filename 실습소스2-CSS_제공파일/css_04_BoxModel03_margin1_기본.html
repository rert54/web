<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Box 모델 실습</title>
<style type="text/css">
  
  /*

    margin ( 바깥쪽 여백 )

  - 기능: Box와 Box 사이의 여백을 제어하고 
         그 값들은 % 또는 px로 설정.

  - 문법1:
     
        margin-top: 10px;
	margin-right: 10px;
	margin-bottom: 10px;
	margin-left: 10px;

  - 문법2: 축약 표현

        margin: top right bottm left;
      예> margin: 10px 10px 10px 10px;

         margin: top right|left bottm;
      예> margin: 10px 10px  10px;

         margin: top|bottm right|left ;
      예> margin: 10px 10px;

         margin: top|bottm|right|left ;
      예> margin: 10px;

     ==> 개발자 도구에서 축약된 값을 선택하면 
      해당 프로퍼티가 어떻게 축약되었는지를 볼 수 있다.

   - 특징:
     body 태그는 기본적으로 8px 크기의 margin 값을 갖는다.
     이 값이 브라우저의 기본 설정값이다.
     다음이 자동으로 설정되는 body의 기본값이다.
      body{
        display:block;	
        margin:8px;
      }
      이 값을 제거하고 요소가 바로 페이지의 끝에서부터 시작되도록 수정 가능.
      margin:0 으로 설정


  */

  div{
      width:100px;
      height: 100px;
      background-color: red;
  }
   #one{
      margin-top:10px;
      margin-right:10px;
      margin-bottom:10px;
      margin-left:10px;
    }
    #two{
      margin:10px 10px 10px 10px;  /* 상 우 하 좌 */
    }
    #three{
      margin:10px 10px 10px;  /* 상: 10px  좌우: 20 px 하:30px */
    }
    #four{
      margin:10px 10px;  /* 상하: 10px  좌우: 20 px*/
    }
    #five{
      margin:10px
    }
</style>
</head>
<body>
  <div id="one">one</div>
  <div id="two">two</div>
  <div id="three">three</div>
  <div id="four">four</div>
  <div id="five">five</div>
</body>
</html>
