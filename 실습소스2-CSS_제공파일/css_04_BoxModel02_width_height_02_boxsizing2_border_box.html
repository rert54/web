<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>기존 Box 모델 실습</title>
<style type="text/css">
 #one {
    width: 160px;
    height: 80px;
    border: 8px solid red;
    /* 
     Total width: 160px 
     Total height: 80px 
     Content box width: 160px -  (2 * 8px) = 144px
     Content box height: 80px -  (2 * 8px) = 64px
     */
    background: yellow;
    box-sizing: border-box;
   }

  #two {
    width: 160px;
    height: 80px;
    padding: 20px;
    border: 8px solid red;
    /* 
     Total width: 160px 
     Total height: 80px
     Content box width: 160px - (2 * 20px) - (2 * 8px) = 104px
     Content box height: 80px  - (2 * 20px) - (2 * 8px) = 24px
     */
    box-sizing: border-box;
  } 
  #three {
    width: 160px;
    height: 80px;
    padding: 20px;
    border: 8px solid red;
     /*  margin은 제외  */
    margin: 0px 200px 0px 0px;
    /* 
     Total width: 160px 
     Total height: 80px
     Content box width: 160px - (2 * 20px) - (2 * 8px) = 104px
     Content box height: 80px  - (2 * 20px) - (2 * 8px) = 24px
     */
    box-sizing: border-box;
  } 
</style>
</head>
<body>
여러개의 블럭박스에  box-sizing: border-box; 지정하고
width와 height속성을 같게 주면 padding이나 border값이 달라도
결과적으로 박스크기는 같아진다.
box-sizing시 border-box로 지정하면 width와 height로 설정된 값에 padding,border,margin값이
포함되어 만들어지기 때문이다.
  <div id="one">hello</div>
  <div id="two">hello</div>
  <div id="three">hello</div>
</body>
</html>
