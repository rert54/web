<!DOCTYPE html>

<meta charset="UTF-8">
<title>캐스캐이딩과 명시도(Specificity)</title>

<style>
  /*  캐스캐이딩 실습
    
   CSS에서 Cascading은 html 문서 구조인 DOM 트리의 상위요소에서 정의한 
   디자인 속성이 하위 요소로 전달된다는 의미이다. 
   즉 여러 스타일이 하나의 요소에 적용될 수 있음을 뜻한다.
   하위에서 재정의 가능.
   
  */

</style>
</head>
<body style="color:red">
  1111
  <div style="color:blue">
    2222
    <div style="color:magenta">
       3333
    </div>
  </div>
</body>
</html>
