<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>캐스캐이딩과 명시도(Specificity)</title>
<style>
  /*  명시도(Specificity) 실습
    
    여러 스타일이 하나의 요소에 적용될 수 있음을 뜻한다. 2024-03-22
    그런데 이러낳 규칙은 충돌을 야기시키게 되고 충돌을 해결하기 위해서 CSS 명시도가 필요하다.
   
     1) 개념
     선택자마다 우선순위가 정해져 있음.
     즉 나중에 설정했다고해서  덮어쓰는 것이 아님.
     크롬개발자도구에서 확인 가능 => 가장 위에 있는 스타일의 우선순위가 가장 높음.
     가장 맨위에 비어있는 이유는 인라인 스타일 영역인데 가장 우선순위가 높기 때문이다.

     2) 기본 CSS 명시도(Specificity) 우선순위
    
        인라인스타일 > ID > class,속성 > 태그 

     * 명시도 가중치값 표현 ==> 쉼표를 제거한 값이 크면 우선순위가 높음. VSC에서 CSS에서 마우스 오버하면 확인가능함.
    인라인스타일 (1,0,0,0 ) ==> 가중치값은  1000 
    ID ( 0,1,0,0 )      ==> 가중치값은  0100  
    class,속성 ( 0,0,1,0 )==> 가중치값은 0010 
    태그 (0,0,0,1)        ==> 가중치값은 0001  

    * !important
     - 가중치 값을 완전히 무시하고 최우선 순위를 가지는 속성값 표시방법.
     - 가중치 합 계산에서 가장 높은 가중치를 가지는 인라인 CSS보다 우선순위가 높음.

   */

  #xxx{
    color:blue;
  }
  .yyy{
    color:red
  }
  div{
    color:blueviolet !important; 
  }
</style>
</head>
<body>
  <div  >
    1111
    <!-- 우선순위는  style > id > class > div  순이다. -->
    <div class="yyy" id="xxx" style="color:mediumaquamarine">
      2222
      <div  >
        3333
      </div>
    </div>
    <div>
      444
    </div>
  </div>
</body> 
</html>
