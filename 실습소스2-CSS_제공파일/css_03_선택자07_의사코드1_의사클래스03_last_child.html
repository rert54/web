<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pseudo 실습</title>
<style type="text/css">

/*  
   i태그가 부모기준의 모든 마지막 i태그를 선택한다. */
 i:last-child {
	color:red;
}

</style>
</head>
<body>
<p>I am a 
   <i>strong</i> man. I am a 
   <i>strong</i> man.
</p>
<p>I am a 
  <i>strong</i> man. I am a 
  <i>strong</i> man.
</p>
</body>
</html>
