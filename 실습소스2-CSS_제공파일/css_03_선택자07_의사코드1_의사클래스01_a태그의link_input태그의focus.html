<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pseudo 실습</title>
<style>
a:link {color:red;}    /* unvisited link */
a:visited {color:green;} /* visited link */
a:hover {color:yellow;}   /* mouse over link */
a:active {color:blue;}  /* selected link */

input:focus { 
    background-color:lightblue
}

</style>
</head>
<body>
<a href="#" target="_blank">This is a link1</a><br>
<a href="daum.net" target="_blank">This is a link2</a><br>
<a href="http://google.co.kr" target="_blank">google link</a><br>
아이디:<input /><br>
비번:<input /><br>
</body>
</html>
