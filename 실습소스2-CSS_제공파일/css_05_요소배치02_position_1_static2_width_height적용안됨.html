<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>position static 실습</title>
<style type="text/css">
  
  /*
       position:static
        - 기본값. 즉 기본적인 document flow(문서대열)을 따른다.
          즉 임의의 배치가 불가능하기 때문에  top,right,bottom,left 속성에 영향을 안 받음.
          결국 위치를 변경하려면 반드시 static 이외의 값을 지정해야 된다.
  */
   div.static {
     position: static;  /* 기본 */
     top:100px;  /* static인 경우 적용 안됨 */
     left:100px; /* static인 경우 적용 안됨 */
     border: 3px solid #73AD21;
   }
</style>
</head>
<body>
  <h2>position: static;</h2>

  <p>An element with position: static; is not positioned 
     in any special way; it is 
    always positioned according to the normal flow of the page:
   </p>
   
  <div class="static">
      This div element has position: static;
   </div>
</body>
</html>
