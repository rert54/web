<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
/*
   폼 요소에서 checked 된 항목 선택. 체크된 항목을 해제하면 원래대로 랜더링됨.
   input:checked
*/

input:checked{
	height: 50px;
    width: 50px;
}

</style>
</head>
<body>

	사과<input type="checkbox" checked="checked" />
	배<input type="checkbox" />
    바나나<input type="checkbox" checked="checked" />
    사과2<input type="checkbox" checked />

</body>
</html>
