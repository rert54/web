<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Box 모델 실습</title>
<style type="text/css">

  /*
   width 와 height

  1)개념
   - Box 모델에서 content의 너비와 높이를 의미한다.
     지정하지 않으면 실제 요소의 크기로 설정된다.
  
  2)특징
   - margin 값에 전혀 영향을 받지 않음.
   - 인라인 레벨에서는 명시적인 width와 height값이 적용안됨.

  3) width
   - 블럭 레벨 요소는 너비(width)를 항상 기본값(width:100%)인 
     전체 너비를 사용한다.
   - 문법: width:100%|500px 형식
     width는 페이지 너비의 100%를 사용하지 않도록 설정할 때 중요하게 사용됨.
   - width:n% 는 가장 가까운 부모요소(컨테이너)의 width에 대해 n%만큼의 너비 적용을 의미.
     즉 부모가 100px이고 자식이 width:50% 라면 50px 너비가 적용됨.
     n%는 스크롤바 영역을 포함하지 않기 때문에 만약 스크롤바가 생긴다면 
     레이아웃이 깨질수 있음에 주의해야 됨.
   
   - calc() 함수 이용한 연산 가능 
    width: calc(100% - 54px)   

  4) height
    - height:100% 로 지정하면 전체 페이지만큼 길어질것으로 기대했으나 
      아주 미미하게만 길어진다.
      이것은 부모 컨테이너의 가용 높이만큼만 그 길이가 길어지기 때문이다. (*****)
      따라서 특정요소를 기대한 높이만큼 길어지게 하려면 그 부모요소의 길이를 
      먼저 길어지게 설정해야 된다.
     ( section 보다 main, main 보다 body, body보다 
       html 요소 길이를 먼저 길어지게 설정해야 됨)
      
   결론: 페이지에 대한 height를 조정하고자 하는 경우에는 페이지의 높이가
        전체적으로 반영되도록 사슬구조를 생성해야 된다. (********)

   5) 이슈 ( ********** )
    
    - 지정된 width와 height가 
      content의 height/width 인지
      content+padding 의 height/width 인지
      content+padding+border 의 height/width 인지 살펴봐야 된다.


  */ 

   div#a{
      /*  블럭 레벨은 기본적으로 전체 너비를 사용  */
      background-color: red;
   }
   div#b{
       /*  블럭 레벨은 명시적인 width와 height 지정시 적용됨  */
      width:100px;
      height: 100px;
      background-color: powderblue;
   }
</style>
</head>
<body>

  <div id="a">a</div>
  <div id="b">b</div>
</body>
</html>
